name: Build and deploy Angular app to Azure Web App - trimly

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'   # ⚠️ Use LTS, not 24

      - name: Install dependencies
        run: npm install
        working-directory: frontend/Trimly.Web

      - name: Build Angular app
        run: npm run build -- --configuration production
        working-directory: frontend/Trimly.Web

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: angular-app
          path: frontend/Trimly.Web/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: angular-app

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'trimly'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_9243EDF803C540C4BA50537A8FA18B7C }}

